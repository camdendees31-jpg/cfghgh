name: Build Mod

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install QPM
        run: |
          mkdir -p ~/qpm
          curl -L https://github.com/QuestPackageManager/QPM.CLI/releases/latest/download/qpm-linux -o ~/qpm/qpm
          chmod +x ~/qpm/qpm
          echo "$HOME/qpm" >> $GITHUB_PATH

      - name: Restore QPM dependencies
        run: qpm restore

      - name: Build .so
        run: qpm s build

      - name: Package .qmod
        run: qpm s qmod

      - name: Upload .qmod artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-qmod
          path: "*.qmod"
          if-no-files-found: error

      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-so
          path: "build/*.so"
          if-no-files-found: warn

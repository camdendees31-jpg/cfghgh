name: Build Mod

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: List QPM release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view --repo QuestPackageManager/QPM.CLI --json assets \
            | jq -r '.assets[].name'

      - name: Install QPM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/qpm
          gh release download --repo QuestPackageManager/QPM.CLI \
            --pattern "*linux*" \
            --dir ~/qpm \
            --clobber
          ls ~/qpm
          BINARY=$(find ~/qpm -type f | head -n 1)
          echo "Found binary: $BINARY"
          mv "$BINARY" ~/qpm/qpm
          chmod +x ~/qpm/qpm
          echo "$HOME/qpm" >> $GITHUB_PATH

      - name: Verify QPM installed
        run: qpm --version

      - name: Restore QPM dependencies
        run: qpm restore

      - name: Setup NDK
        run: qpm ndk resolve -d

      - name: Build .so
        run: qpm s build

      - name: Package .qmod
        run: qpm s qmod

      - name: Upload .qmod artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-qmod
          path: "*.qmod"
          if-no-files-found: error

      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-so
          path: "build/*.so"
          if-no-files-found: warn

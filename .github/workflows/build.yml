name: Build Mod

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install QPM
        run: |
          # Use GitHub API to find the correct Linux binary name
          ASSET_URL=$(curl -s https://api.github.com/repos/QuestPackageManager/QPM.CLI/releases/latest \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            | jq -r '.assets[] | select(.name | test("linux"; "i")) | select(.name | test("musl|gnu")) | .browser_download_url' \
            | head -n 1)

          echo "Downloading QPM from: $ASSET_URL"
          mkdir -p ~/qpm
          curl -L "$ASSET_URL" -o ~/qpm/qpm
          chmod +x ~/qpm/qpm
          echo "$HOME/qpm" >> $GITHUB_PATH

      - name: Verify QPM installed
        run: qpm --version

      - name: Restore QPM dependencies
        run: qpm restore

      - name: Setup NDK
        run: qpm ndk resolve -d

      - name: Build .so
        run: qpm s build

      - name: Package .qmod
        run: qpm s qmod

      - name: Upload .qmod artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-qmod
          path: "*.qmod"
          if-no-files-found: error

      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-so
          path: "build/*.so"
          if-no-files-found: warn

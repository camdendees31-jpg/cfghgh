name: Build Mod

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake

      - name: Install QPM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/qpm
          gh release download --repo QuestPackageManager/QPM.CLI \
            --pattern "qpm-linux-x64-musl.zip" \
            --dir ~/qpm \
            --clobber
          unzip ~/qpm/qpm-linux-x64-musl.zip -d ~/qpm
          chmod +x ~/qpm/qpm
          echo "$HOME/qpm" >> $GITHUB_PATH

      - name: Verify QPM installed
        run: qpm --version

      - name: Cache QPM deps
        uses: actions/cache@v4
        with:
          path: ~/.local/share/QPM-RS/cache
          key: qpm-cache-${{ hashFiles('qpm.shared.json', 'qpm.json') }}
          restore-keys: qpm-cache-

      - name: Restore QPM dependencies
        run: qpm restore

      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: ~/.local/share/QPM-RS/ndk
          key: qpm-ndk-r27

      - name: Setup NDK
        run: qpm ndk resolve -d

      - name: Build .so
        run: qpm s build

      - name: Package .qmod
        run: qpm s qmod

      - name: Upload .qmod artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-qmod
          path: "*.qmod"
          if-no-files-found: error

      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-so
          path: "build/*.so"
          if-no-files-found: warn
